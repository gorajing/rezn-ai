# Optional: local Redis for offline development.
# The app defaults to Redis Cloud (see .env.example / REDIS_URL). Use this only
# if you want a local Redis instead: `docker compose up -d redis`, then set
# REDIS_URL=redis://localhost:6379/0 in your .env.
services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
