# Local full-stack: Redis + the REZN generator API.
#
#   docker compose up --build         # API on :8000, Redis on :6379
#   docker compose up -d redis        # just Redis (run the API/UI on the host)
#
# The API reads secrets from .env (gitignored). Point the frontend at the API
# with NEXT_PUBLIC_API_URL=http://localhost:8000.
services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Inside the compose network Redis is reachable as "redis".
      REDIS_URL: redis://redis:6379/0
      REDIS_REQUIRED: "true"
      REZN_PRODUCTION: "true"
      REZN_ENABLE_INFERENCE: "1"
      REZN_INFERENCE_REQUIRED: "true"
      AGENT_MEMORY_REQUIRED: "true"
      # Agent Memory creds come from .env (Redis Cloud managed service).
      AGENT_MEMORY_URL: ${AGENT_MEMORY_URL:-}
      AGENT_MEMORY_STORE_ID: ${AGENT_MEMORY_STORE_ID:-}
      AGENT_MEMORY_API_KEY: ${AGENT_MEMORY_API_KEY:-}
    volumes:
      # Persist generated artifacts/runs across restarts.
      - ./artifacts:/app/artifacts
      - ./runs:/app/runs
    depends_on:
      redis:
        condition: service_healthy

  # ── Optional: Redis Agent Memory (Redis Iris) for the Producer Taste Profile ──
  # Enable with:  docker compose --profile memory up agent-memory
  # Then set AGENT_MEMORY_URL=http://localhost:8088 in .env (host) or
  # AGENT_MEMORY_URL=http://agent-memory:8000 for the in-network api service.
  # Needs an embedding/LLM key (OPENAI_API_KEY) for semantic search.
  agent-redis:
    image: redis:8
    profiles: ["memory"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  agent-memory:
    image: redislabs/agent-memory-server:latest
    profiles: ["memory"]
    command: ["agent-memory", "api", "--host", "0.0.0.0", "--port", "8000", "--task-backend", "asyncio"]
    ports:
      - "8088:8000"
    environment:
      REDIS_URL: redis://agent-redis:6379/0
      DISABLE_AUTH: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      agent-redis:
        condition: service_healthy
